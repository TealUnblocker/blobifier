<!DOCTYPE html>
<html>
<head>
	<title>blobifier</title>
</head>
<body>
	<center>
    <button onclick="b()">Blobify the cube</button>
    </center>
    <script>
        function b() {
        const currentSiteUrl = window.location.href + '?redirect=true';
    
        const htmlContent = `
            <html>
                <head>
                    <title>Title</title>
                    <link rel="shortcut icon" id="tab-favicon" href="Shortcut Icon">
                    <style>
                        body, html {
                            margin: 0;
                            padding: 0;
                            width: 100%;
                            height: 100%;
                            overflow: hidden;
                        }
                        iframe {
                            position: fixed;
                            top: 0;
                            left: 0;
                            width: 100%;
                            height: 100%;
                            border: none;
                        }
                    </style>
                </head>
                <body>
                    <iframe src="https://englishstudy-dusky.vercel.app/"></iframe>
    </body>
            </html>
        `;
    
        const blob = new Blob([htmlContent], {
            type: 'text/html'
        });
    
        const blobUrl = URL.createObjectURL(blob);
    
        let newWindow = window.open(blobUrl);
        if (newWindow) {
            newWindow.onload = () => {
            };
        }
    }
    </script>
</body>
</html>
