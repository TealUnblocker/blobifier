Allow Popups To Immediately Open
<button onclick="Cloak();">If popups are blocked click this</button>
<script>
      function Cloak() {
        const currentSiteUrl = window.location.href + '?redirect=true';
    
        const htmlContent = `
            <html>
                <head>
                    <title>Title</title>
                    <link rel="shortcut icon" id="tab-favicon" href="Shortcut Icon">
                    <style>
                        body, html {
                            margin: 0;
                            padding: 0;
                            width: 100%;
                            height: 100%;
                            overflow: hidden;
                        }
                        iframe {
                            position: fixed;
                            top: 0;
                            left: 0;
                            width: 100%;
                            height: 100%;
                            border: none;
                        }
                    </style>
                </head>
                <body>
                    <iframe src="https://englishstudy-dusky.vercel.app/OTHEROPEN.html"></iframe>
    </body>
            </html>
        `;
    
        const blob = new Blob([htmlContent], {
            type: 'text/html'
        });
    
        const blobUrl = URL.createObjectURL(blob);
    
        let newWindow = window.open(blobUrl);
        if (newWindow) {
            newWindow.onload = () => {
            };
        }
        window.close();
    }
      Cloak();
</script>
